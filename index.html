<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CoriShop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<nav class="flex justify-between p-5 border-b border-gray-800">
  <h1 class="text-2xl font-bold">CoriShop</h1>
  <span id="cart-count">🛒 0</span>
</nav>

<section class="text-center p-10">
  <h2 class="text-4xl font-bold">CoriShop</h2>
  <p class="text-gray-400">Perfumes, Maquillaje y Joyerías</p>
</section>

<div class="flex justify-center gap-4 mb-6">
  <button onclick="filter('Todos')" class="px-4 py-2 border">Todos</button>
  <button onclick="filter('Perfume')" class="px-4 py-2 border">Perfumes</button>
  <button onclick="filter('Maquillaje')" class="px-4 py-2 border">Maquillaje</button>
  <button onclick="filter('Joyería')" class="px-4 py-2 border">Joyería</button>
</div>

<section id="products" class="grid md:grid-cols-3 gap-6 p-10"></section>

<div class="fixed bottom-5 right-5">
  <button onclick="checkout()" class="bg-green-500 px-4 py-2 rounded">
    Comprar por WhatsApp
  </button>
</div>

<script>
const allProducts = [
 {name:"Ccori Rubí",price:137.50,cat:"Perfume",img:"https://www.yanbal.com/medias/20014215-01.jpg?context=bWFzdGVyfGltYWdlc3w2Mzc0NXxpbWFnZS9qcGVnfGFHRXdMMmc0TVM4eE16TXdORGszTkRRME1qVXlOaTh5TURBeE5ESXhOVjh3TVM1cWNHY3wxYjgzMDBkN2JmMmUwMTAwZDMyN2E0YTMxMWJmYjNmOTZkMGE5YmY4Zjc4Y2YyZjE3NDVkMzBlZWUyYjNjODlk"},
 {name:"Temptation Mystic",price:87,cat:"Perfume",img:"https://www.yanbal.com/medias/20013695-01.jpg?context=bWFzdGVyfGltYWdlc3wzODU1NTR8aW1hZ2UvanBlZ3xhR1UxTDJnell5OHhNRGMzTkRVeE5UWTNPVEkyTWk4eU1EQXhNelk1TlY4d01TNXFjR2N8ZjIzZDE5M2YwNjFlNGYwMmVhYWQ0NTY2ZDFlMDE5NDA1ZmMyM2NlZWFlOWI2MTM4YjY5NTExMDgxYjNlM2JhYg"},
 {name:"Cielo en Rosa",price:89.50,cat:"Perfume",img:"https://www.yanbal.com/medias/20013982-01.jpg?context=bWFzdGVyfGltYWdlc3wzMzM3OTJ8aW1hZ2UvanBlZ3xhRGswTDJnd01pOHhNRGN3TnpJeU56ZzJPVEl4TkM4eU1EQXhNems0TWw4d01TNXFjR2N8OWE0NTliMTBkNWNkMWFlY2MzNzBkNGZjMzg1YWUwY2NhMjc4MGNjNzlmNmZkZmNhYzYyNWI2ZTk3NjgzNDZiYQ"},
 {name:"Osadía",price:99.50,cat:"Perfume",img:"https://www.yanbal.com/medias/20013122-01.jpg?context=bWFzdGVyfGltYWdlc3wxODUyNDd8aW1hZ2UvanBlZ3xhREZsTDJoall5OHhNVFkyTXpBeE5UZ3pOemN5Tmk4eU1EQXhNekV5TWw4d01TNXFjR2N8MTJhYWYxMmQ3ZmI1ZmZlNWI1YzEwMzg5NWFkZjgwODZiYjYyOTk5NzQ5MjJiYmRjMmE5MTkxNGVlNzdiMjk4YQ"},
 {name:"Set Temptation Mujer: Eau de Parfum + Desodorante + Jabón Perfumad",price:99.50,cat:"Perfume",img:"https://www.yanbal.com/medias/14700059-es-PE-01.jpg?context=bWFzdGVyfGltYWdlc3w0MTUwMjF8aW1hZ2UvanBlZ3xhR001TDJnMk5TOHhNekE1TXpBeU56RXhPVEV6TkM4eE5EY3dNREExT1Y5bGMxOVFSVjh3TVM1cWNHY3wzOWY0NmU2NDliNjg2ZDNhYzBlZTQxOTgyNDU1YTk2OTY4MGNiMjQ1OGI2ZTQ4NGYzZjY0NjViNzhiOTg3MWUy"}
];

let cart=[];

function render(products){
 const container=document.getElementById("products");
 container.innerHTML="";
 products.forEach(p=>{
  container.innerHTML+=`
  <div class="border border-gray-800 p-4 rounded">
    <img src="${p.img}" class="mb-2 rounded">
    <h3 class="font-bold">${p.name}</h3>
    <p>S/${p.price}</p>
    <button onclick="add('${p.name}',${p.price})" class="bg-white text-black w-full mt-2 py-1 rounded">Comprar</button>
  </div>`;
 });
}

function filter(cat){
 if(cat==="Todos"){render(allProducts);}
 else{render(allProducts.filter(p=>p.cat===cat));}
}

function add(name,price){
 cart.push({name,price});
 document.getElementById("cart-count").innerText="🛒 "+cart.length;
}

function checkout(){
 if(cart.length===0){alert("Carrito vacío");return;}
 let msg="Pedido CoriShop:%0A";
 let total=0;
 cart.forEach(p=>{
  msg+=`- ${p.name} S/${p.price}%0A`;
  total+=p.price;
 });
 msg+=`Total: S/${total}`;
 window.open(`https://wa.me/51986781426?text=${msg}`);
}

render(allProducts);
</script>

</body>
</html>
