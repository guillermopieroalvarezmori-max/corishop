<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CoriShop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

  <!-- NAVBAR -->
  <nav class="flex justify-between items-center p-5 border-b border-gray-800">
    <h1 class="text-2xl font-bold">CoriShop</h1>
    <span id="cart-count">🛒 0</span>
  </nav>

  <!-- HERO -->
  <section class="text-center p-10">
    <h2 class="text-4xl font-bold">Bienvenido a CoriShop</h2>
    <p class="text-gray-400 mt-2">Elegancia. Estilo. Exclusividad.</p>
  </section>

  <!-- PRODUCTOS -->
  <section class="grid grid-cols-1 md:grid-cols-3 gap-6 p-10">

    <div class="border border-gray-800 p-4 rounded">
      <img src="https://picsum.photos/300/200" class="mb-2 rounded">
      <h3 class="font-bold">Perfume Luxe</h3>
      <p>S/120</p>
      <button onclick="addToCart('Perfume Luxe',120)" class="bg-white text-black w-full mt-2 py-1 rounded">Comprar</button>
    </div>

    <div class="border border-gray-800 p-4 rounded">
      <img src="https://picsum.photos/300/201" class="mb-2 rounded">
      <h3 class="font-bold">Ropa Premium</h3>
      <p>S/99</p>
      <button onclick="addToCart('Ropa Premium',99)" class="bg-white text-black w-full mt-2 py-1 rounded">Comprar</button>
    </div>

    <div class="border border-gray-800 p-4 rounded">
      <img src="https://picsum.photos/300/202" class="mb-2 rounded">
      <h3 class="font-bold">Accesorio Elite</h3>
      <p>S/150</p>
      <button onclick="addToCart('Accesorio Elite',150)" class="bg-white text-black w-full mt-2 py-1 rounded">Comprar</button>
    </div>

  </section>

  <!-- BOTÓN WHATSAPP -->
  <div class="fixed bottom-5 right-5">
    <button onclick="checkout()" class="bg-green-500 px-4 py-2 rounded">
      Comprar por WhatsApp
    </button>
  </div>

  <script>
    let cart = [];

    function addToCart(name, price){
      cart.push({name, price});
      document.getElementById("cart-count").innerText = "🛒 " + cart.length;
    }

    function checkout(){
      if(cart.length === 0){
        alert("Carrito vacío");
        return;
      }

      let message = "Hola, quiero comprar:%0A";
      let total = 0;

      cart.forEach(p => {
        message += `- ${p.name} (S/ ${p.price})%0A`;
        total += p.price;
      });

      message += `Total: S/ ${total}`;

      window.open(`https://wa.me/51986781426?text=${message}`);
    }
  </script>

</body>
</html>
