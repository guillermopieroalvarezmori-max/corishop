<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CoriShop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<nav class="flex justify-between p-5 border-b border-gray-800">
  <h1 class="text-2xl font-bold">CoriShop</h1>
  <span id="cart-count">🛒 0</span>
</nav>

<section class="text-center p-10">
  <h2 class="text-4xl font-bold">CoriShop</h2>
  <p class="text-gray-400">Perfumes, Ropa y Accesorios</p>
</section>

<div class="flex justify-center gap-4 mb-6">
  <button onclick="filter('Todos')" class="px-4 py-2 border">Todos</button>
  <button onclick="filter('Perfume')" class="px-4 py-2 border">Perfumes</button>
  <button onclick="filter('Ropa')" class="px-4 py-2 border">Ropa</button>
  <button onclick="filter('Accesorio')" class="px-4 py-2 border">Accesorios</button>
</div>

<section id="products" class="grid md:grid-cols-3 gap-6 p-10"></section>

<div class="fixed bottom-5 right-5">
  <button onclick="checkout()" class="bg-green-500 px-4 py-2 rounded">
    Comprar por WhatsApp
  </button>
</div>

<script>
const allProducts = [
 {name:"Perfume Luxe",price:120,cat:"Perfume",img:"https://www.yanbal.com/pe/corporate/images/productos/20012907.jpg"
 {name:"Perfume Gold",price:150,cat:"Perfume",img:"https://picsum.photos/300/200?2"},
 {name:"Camisa Premium",price:90,cat:"Ropa",img:"https://picsum.photos/300/200?3"},
 {name:"Chaqueta Elite",price:200,cat:"Ropa",img:"https://picsum.photos/300/200?4"},
 {name:"Reloj Elegante",price:180,cat:"Accesorio",img:"https://picsum.photos/300/200?5"},
 {name:"Pulsera Lux",price:70,cat:"Accesorio",img:"https://picsum.photos/300/200?6"},
];

let cart=[];

function render(products){
 const container=document.getElementById("products");
 container.innerHTML="";
 products.forEach(p=>{
  container.innerHTML+=`
  <div class="border border-gray-800 p-4 rounded">
    <img src="${p.img}" class="mb-2 rounded">
    <h3 class="font-bold">${p.name}</h3>
    <p>S/${p.price}</p>
    <button onclick="add('${p.name}',${p.price})" class="bg-white text-black w-full mt-2 py-1 rounded">Comprar</button>
  </div>`;
 });
}

function filter(cat){
 if(cat==="Todos"){render(allProducts);}
 else{render(allProducts.filter(p=>p.cat===cat));}
}

function add(name,price){
 cart.push({name,price});
 document.getElementById("cart-count").innerText="🛒 "+cart.length;
}

function checkout(){
 if(cart.length===0){alert("Carrito vacío");return;}
 let msg="Pedido CoriShop:%0A";
 let total=0;
 cart.forEach(p=>{
  msg+=`- ${p.name} S/${p.price}%0A`;
  total+=p.price;
 });
 msg+=`Total: S/${total}`;
 window.open(`https://wa.me/51986781426?text=${msg}`);
}

render(allProducts);
</script>

</body>
</html>
