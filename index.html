<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CoriShop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

  <!-- NAVBAR -->
  <nav class="flex justify-between p-5 border-b border-gray-800">
    <h1 class="text-2xl font-bold">CoriShop</h1>
    <span>🛒</span>
  </nav>

  <!-- HERO -->
  <section class="text-center p-10">
    <h2 class="text-4xl font-bold">Bienvenido a CoriShop</h2>
    <p class="text-gray-400 mt-2">Elegancia. Estilo. Exclusividad.</p>
  </section>

  <!-- PRODUCTOS -->
  <section class="grid grid-cols-1 md:grid-cols-3 gap-6 p-10">

    <div class="border border-gray-800 p-4 rounded">
      <img src="https://picsum.photos/300/200" class="mb-2 rounded">
      <h3 class="font-bold">Perfume Luxe</h3>
      <p>S/120</p>
      <button class="bg-white text-black w-full mt-2 py-1 rounded">Comprar</button>
    </div>

    <div class="border border-gray-800 p-4 rounded">
      <img src="https://picsum.photos/300/201" class="mb-2 rounded">
      <h3 class="font-bold">Ropa Premium</h3>
      <p>S/99</p>
      <button class="bg-white text-black w-full mt-2 py-1 rounded">Comprar</button>
    </div>

    <div class="border border-gray-800 p-4 rounded">
      <img src="https://picsum.photos/300/202" class="mb-2 rounded">
      <h3 class="font-bold">Accesorio Elite</h3>
      <p>S/150</p>
      <button class="bg-white text-black w-full mt-2 py-1 rounded">Comprar</button>
    </div>

  </section>

</body>
</html>
