let cart=[];

function render(products){
 const container=document.getElementById("products");
 container.innerHTML="";
 products.forEach(p=>{
  container.innerHTML+=`
  <div class="border border-gray-800 p-4 rounded">
    <img src="${p.img}" class="mb-2 rounded w-full h-48 object-cover">
    <h3 class="font-bold">${p.name}</h3>
    <p>S/${p.price}</p>
    <button onclick="add('${p.name}',${p.price})" class="bg-white text-black w-full mt-2 py-1 rounded">Comprar</button>
  </div>`;
 });
}

function filter(cat){
 if(cat==="Todos"){render(allProducts);}
 else{render(allProducts.filter(p=>p.cat===cat));}
}

function add(name,price){
 cart.push({name,price});
 document.getElementById("cart-count").innerText="🛒 "+cart.length;
}

function checkout(){
 if(cart.length===0){alert("Carrito vacío");return;}
 let msg="Pedido CoriShop:%0A";
 let total=0;
 cart.forEach(p=>{
  msg+=`- ${p.name} S/${p.price}%0A`;
  total+=p.price;
 });
 msg+=`Total: S/${total}`;
 window.open(`https://wa.me/51986781426?text=${msg}`);
}

render(allProducts);

</script>
