<script>

// 🔥 CONFIG FIREBASE (REEMPLAZA ESTO)
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let cart = [];
let products = [];

// 🔄 CARGAR PRODUCTOS
function loadProducts(){
 db.collection("products").onSnapshot(snapshot=>{
  products=[];
  let html="";
  snapshot.forEach(doc=>{
   const p = doc.data();
   products.push(p);
   html+=`
   <div class="border p-4 rounded">
    <img src="${p.img || 'https://via.placeholder.com/300'}" class="h-40 w-full object-cover">
    <h3>${p.name}</h3>
    <p>S/${p.price}</p>
    <button onclick="add('${p.name}',${p.price})" class="bg-white text-black w-full mt-2">Agregar</button>
   </div>`;
  });
  document.getElementById("products").innerHTML = html;
 });
}

// 🛒 CARRITO
function add(name,price){
 cart.push({name,price});
 document.getElementById("cart-count").innerText="🛒 "+cart.length;
}

// 📱 WHATSAPP
function checkout(){
 if(cart.length===0){alert("Carrito vacío");return;}
 let msg="Pedido:%0A";
 let total=0;
 cart.forEach(p=>{
  msg+=`- ${p.name} S/${p.price}%0A`;
  total+=p.price;
 });
 msg+=`Total S/${total}`;
 window.open(`https://wa.me/51986781426?text=${msg}`);
}

// 🔐 LOGIN
function login(){
 const email=document.getElementById("email").value;
 const pass=document.getElementById("password").value;

 auth.signInWithEmailAndPassword(email,pass)
 .then(()=>{
  document.getElementById("admin").style.display="block";
  alert("Admin activado");
 });
}

// ➕ AGREGAR PRODUCTO
function addProduct(){
 const name=document.getElementById("name").value;
 const price=parseFloat(document.getElementById("price").value);
 const cat=document.getElementById("cat").value;
 const img=document.getElementById("img").value;

 db.collection("products").add({name,price,cat,img});
}

// 🔍 BUSCADOR
document.getElementById("search").addEventListener("input", e=>{
 const text=e.target.value.toLowerCase();
 const filtered=products.filter(p=>p.name.toLowerCase().includes(text));

 let html="";
 filtered.forEach(p=>{
  html+=`
  <div class="border p-4">
    <img src="${p.img || 'https://via.placeholder.com/300'}" class="h-40 w-full">
    <h3>${p.name}</h3>
    <p>S/${p.price}</p>
    <button onclick="add('${p.name}',${p.price})" class="bg-white text-black w-full">Agregar</button>
  </div>`;
 });

 document.getElementById("products").innerHTML=html;
});
